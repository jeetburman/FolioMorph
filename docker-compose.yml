version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: foliomorph_postgres
    restart: always
    environment:
      POSTGRES_USER: flipbook_user
      POSTGRES_PASSWORD: flipbook_pass
      POSTGRES_DB: flipbook_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: foliomorph_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data: